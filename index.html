<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Miner — Earn System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
:root{
  --bg:#0a0d12;
  --panel:#11161f;
  --primary:#00d4ff;
  --text:#eaf2f8;
  --sub:#7c8b99;
}

body{
  margin:0;
  background:var(--bg);
  font-family:sans-serif;
  color:var(--text);
}

/* HEADER */
.top{
  padding:14px;
  text-align:center;
  font-weight:bold;
  color:var(--primary);
}

/* BALANCE */
.balance{
  margin:10px;
  padding:18px;
  border-radius:14px;
  background:linear-gradient(135deg,#00d4ff,#0077ff);
  text-align:center;
  color:#000;
}

.balance span{
  font-size:28px;
  display:block;
}

/* ACTION BAR */
.actions{
  display:flex;
  gap:10px;
  padding:10px;
}

.actions button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  font-weight:bold;
}

/* CARDS */
.section{
  padding:10px;
}

.box{
  background:var(--panel);
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0e141c;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:var(--sub);
}

.nav .on{
  color:var(--primary);
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.popup button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#000;
}
</style>
</head>

<body>

<div class="top">⚡ Nova Miner</div>

<div id="app">

<!-- HOME -->
<div id="home">

<div class="balance">
  Balance
  <span>$<b id="bal">0.000000</b></span>
</div>

<div class="actions">
  <button onclick="adsReward()">Watch Ad</button>
  <button onclick="startBonus()">Bonus</button>
</div>

<div class="section">

<div class="box">
  <div>Today's Profit</div>
  <b id="today">0.000000</b>
</div>

<div class="box">
  <div>Energy</div>
  <b id="energy">20</b>
</div>

<div class="box">
  <button onclick="claimTask()">Claim Gold</button>
  <div id="taskArea"></div>
</div>

</div>

</div>

<!-- WALLET -->
<div id="wallet" style="display:none;padding:10px;">
<div class="box">
<select id="method">
<option>Bank</option>
<option>Litecoin</option>
<option>Opay</option>
<option>Payeer</option>
</select>

<input id="details" placeholder="Enter details">

<button onclick="withdraw()">Withdraw</button>
</div>
</div>

<!-- INFO -->
<div id="info" style="display:none;padding:10px;">
<div class="box">
Earn by mining, ads, and tasks.
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button class="on" onclick="nav('home',this)">Home</button>
<button onclick="nav('wallet',this)">Wallet</button>
<button onclick="nav('info',this)">Info</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<h3>Join Channel</h3>
<button onclick="join()">Join & Earn</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* STATE */
let state = {
  balance: Number(localStorage.balance)||0,
  today: Number(localStorage.today)||0,
  energy: Number(localStorage.energy)||20
};

function save(){
  localStorage.balance = state.balance;
  localStorage.today = state.today;
  localStorage.energy = state.energy;
}

/* UI */
function render(){
  bal.textContent = state.balance.toFixed(6);
  today.textContent = state.today.toFixed(6);
  energy.textContent = state.energy;
}

/* NAV */
function nav(page,btn){
  home.style.display="none";
  wallet.style.display="none";
  info.style.display="none";

  document.getElementById(page).style.display="block";

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

/* MINING */
setInterval(()=>{
  state.balance += 0.000001;
  state.today += 0.000001;
  render();
  save();
},1000);

/* ADSGRAM */
const ad = Adsgram.init({blockId:"27164"});

/* WATCH */
function adsReward(){
  ad.show().then(r=>{
    if(r.done){
      state.balance += 0.002;
      state.energy += 5;
      render(); save();
    }
  });
}

/* CLAIM TASK */
const tasks = ["27165","27166","27167","27168"];

function claimTask(){
  const id = tasks[Math.floor(Math.random()*tasks.length)];

  taskArea.innerHTML = `
  <adsgram-task data-block-id="task-${id}"></adsgram-task>
  <button id="doneBtn" style="display:none">Claim</button>
  `;

  let done=false;

  taskArea.querySelector("adsgram-task")
  .addEventListener("reward",()=>{
    done=true;
    doneBtn.style.display="block";
  },{once:true});

  doneBtn.onclick=()=>{
    if(!done)return alert("Complete task first");
    state.energy +=5;
    render(); save();
    taskArea.innerHTML="";
  }
}

/* BONUS */
let step=0;

function startBonus(){
  step=0;
  nextBonus();
}

function nextBonus(){
  if(step>=4){
    state.energy+=40;
    render(); save();
    taskArea.innerHTML="";
    alert("Bonus completed");
    return;
  }

  const id = tasks[Math.floor(Math.random()*tasks.length)];

  taskArea.innerHTML = `
  <div>Step ${step+1}/4</div>
  <adsgram-task data-block-id="task-${id}"></adsgram-task>
  <button id="next" style="display:none">Next</button>
  `;

  let ok=false;

  taskArea.querySelector("adsgram-task")
  .addEventListener("reward",()=>{
    ok=true;
    next.style.display="block";
  },{once:true});

  next.onclick=()=>{
    if(!ok)return;
    step++;
    nextBonus();
  }
}

/* WITHDRAW */
function withdraw(){
  if(state.balance < 10){
    alert("Minimum $10");
    return;
  }
  alert("Request sent");
}

/* PRELOAD */
Adsgram.init({blockId:"27229"}).show().finally(()=>{
  popup.style.display="flex";
});

/* JOIN */
function join(){
  state.energy+=4;
  render(); save();
  popup.style.display="none";
  window.open("https://t.me/earnzoners");
}

render();
</script>

</body>
</html>
